services:
  # Backend Service
  - type: web
    name: constitution-gpt-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: MONGO_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: constitution-data
      mountPath: /opt/render/project/src/backend/chroma_db
      sizeGB: 1
