services:
  # Backend Service
  - type: web
    name: constitution-gpt-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    rootDir: backend
    envVars:
      - key: MONGO_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://constitution-gpt-blue.vercel.app
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GCP_CREDENTIALS_JSON
        sync: false
      - key: DATA_DIR
        value: /data
    disk:
      name: constitution-data
      mountPath: /data
      sizeGB: 1
